<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Bridge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --fg: #e0e0e0; --fg2: #888; --accent: #e94560;
  --user: #0f3460; --claude: #1a1a2e; --tool: #2a2a4a;
  --border: #333; --input-bg: #16213e;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; }

header {
  background: var(--bg2); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 18px; font-weight: 600; }
header h1 span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; }
.header-actions button {
  background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
}
.header-actions button:hover { background: var(--accent); border-color: var(--accent); }
#status-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; display: inline-block; margin-right: 8px; }
#status-dot.online { background: #4caf50; }
#status-dot.busy { background: #ff9800; animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }

#messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px;
}
.msg {
  max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px;
  line-height: 1.5; white-space: pre-wrap; word-break: break-word;
}
.msg.user { background: var(--user); align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.claude { background: var(--bg2); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
.msg.tool { background: var(--tool); align-self: flex-start; font-size: 12px; color: var(--fg2); border-radius: 8px; padding: 6px 10px; }
.msg.error { background: #4a1525; align-self: flex-start; color: #ff6b6b; border: 1px solid #6b2020; }
.msg.system { background: transparent; align-self: center; color: var(--fg2); font-size: 12px; }

footer {
  background: var(--bg2); padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
#input {
  flex: 1; background: var(--input-bg); color: var(--fg); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; font-size: 14px; resize: none;
  font-family: inherit; min-height: 44px; max-height: 200px;
}
#input:focus { outline: none; border-color: var(--accent); }
#input::placeholder { color: var(--fg2); }
#send-btn {
  background: var(--accent); color: white; border: none; border-radius: 10px;
  padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600;
  align-self: flex-end;
}
#send-btn:hover { opacity: 0.9; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#stop-btn {
  background: #c0392b; color: white; border: none; border-radius: 10px;
  padding: 10px 16px; cursor: pointer; font-size: 14px; display: none;
  align-self: flex-end;
}
#stop-btn:hover { opacity: 0.9; }
</style>
</head>
<body>

<header>
  <h1><span id="status-dot"></span>Claude <span>Bridge</span></h1>
  <div class="header-actions">
    <button onclick="newChat()">New Chat</button>
    <button onclick="showStatus()">Status</button>
  </div>
</header>

<div id="messages"></div>

<footer>
  <textarea id="input" rows="1" placeholder="Send a message..." onkeydown="handleKey(event)"></textarea>
  <button id="stop-btn" onclick="stopQuery()">Stop</button>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</footer>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const statusDot = document.getElementById('status-dot');

let ws = null;
let busy = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    statusDot.className = 'online';
    addMsg('Connected', 'system');
  };

  ws.onclose = () => {
    statusDot.className = '';
    addMsg('Disconnected. Reconnecting...', 'system');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => { ws.close(); };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleEvent(msg);
  };
}

function handleEvent(msg) {
  switch (msg.type) {
    case 'connected':
      break;
    case 'started':
      setBusy(true);
      break;
    case 'tool':
      addMsg(msg.data, 'tool');
      break;
    case 'text':
      addMsg(msg.data, 'claude');
      break;
    case 'result':
      if (msg.data) addMsg(msg.data, 'claude');
      setBusy(false);
      break;
    case 'error':
      addMsg(msg.data, 'error');
      setBusy(false);
      break;
    case 'stopped':
      addMsg('Stopped', 'system');
      setBusy(false);
      break;
    case 'session_reset':
      addMsg('Session reset', 'system');
      break;
    case 'status':
      const s = msg.data;
      addMsg(`Session: ${s.session}\nModel: ${s.model}\nBusy: ${s.busy}\nMessages: ${s.messages}`, 'system');
      break;
    case 'resend':
      msg.data.forEach(p => addMsg(p, 'claude'));
      break;
  }
}

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setBusy(b) {
  busy = b;
  sendBtn.disabled = b;
  stopBtn.style.display = b ? 'block' : 'none';
  statusDot.className = b ? 'busy' : 'online';
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy || !ws) return;
  addMsg(text, 'user');
  ws.send(JSON.stringify({ action: 'query', text }));
  inputEl.value = '';
  inputEl.style.height = 'auto';
}

function stopQuery() {
  if (ws) ws.send(JSON.stringify({ action: 'stop' }));
}

function newChat() {
  if (ws) ws.send(JSON.stringify({ action: 'new' }));
  messagesEl.innerHTML = '';
}

function showStatus() {
  if (ws) ws.send(JSON.stringify({ action: 'status' }));
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

connect();
</script>
</body>
</html>
